version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: hartfordvapes-db
    environment:
      POSTGRES_USER: hvuser
      POSTGRES_PASSWORD: hvpassword
      POSTGRES_DB: hartfordvapes
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hvuser -d hartfordvapes"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API
  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: hartfordvapes-api
    environment:
      DATABASE_URL: postgresql://hvuser:hvpassword@postgres:5432/hartfordvapes
      JWT_SECRET: ${JWT_SECRET:-change-this-in-production}
      NODE_ENV: production
      PORT: 3001
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "3001:3001"
    restart: unless-stopped

  # Frontend (if not using Vercel)
  frontend:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: hartfordvapes-web
    environment:
      VITE_API_URL: http://localhost:3001/api
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
